<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AyurTime - Dosha Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f0e8 0%, #e8f5f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      text-align: center;
    }
    .logo { font-size: 2.4rem; margin-bottom: 8px; }
    h1 { font-size: 1.5rem; color: #2d5a27; margin-bottom: 8px; }
    .subtitle { color: #777; font-size: 0.95rem; margin-bottom: 24px; }
    .progress-bar-wrap {
      background: #e8f5f0;
      border-radius: 8px;
      height: 8px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4A9E8A, #2d5a27);
      border-radius: 8px;
      transition: width 0.4s ease;
    }
    .question-label {
      font-size: 0.82rem;
      color: #4A9E8A;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .question-text {
      font-size: 1.15rem;
      font-weight: 600;
      color: #2d3a2d;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .option-btn {
      display: block;
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 12px;
      background: #f5f0e8;
      border: 2px solid transparent;
      border-radius: 12px;
      font-size: 0.95rem;
      color: #2d3a2d;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .option-btn:hover { background: #e8f5f0; border-color: #4A9E8A; }
    .option-btn.selected { background: #e8f5f0; border-color: #4A9E8A; color: #2d5a27; font-weight: 600; }
    .nav-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-secondary { background: #f5f0e8; color: #777; }
    .btn-primary { background: #4A9E8A; color: #fff; }
    .btn-primary:hover { background: #2d5a27; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .skip-link {
      display: block;
      margin-top: 16px;
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: underline;
    }
    /* Welcome screen */
    #screen-welcome .welcome-icon { font-size: 3.5rem; margin-bottom: 16px; }
    #screen-welcome h1 { font-size: 1.8rem; }
    /* Result screen */
    .dosha-badge {
      display: inline-block;
      padding: 8px 24px;
      border-radius: 24px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }
    .score-row { display: flex; justify-content: center; gap: 16px; margin: 16px 0; }
    .score-item { text-align: center; }
    .score-item .score-label { font-size: 0.8rem; color: #777; }
    .score-item .score-val { font-size: 1.4rem; font-weight: 700; }
    .routine-list { text-align: left; margin: 16px 0; }
    .routine-list li {
      padding: 10px 12px;
      background: #f5f0e8;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #2d3a2d;
      list-style: none;
      display: flex;
      justify-content: space-between;
    }
    .routine-list li span { font-weight: 600; color: #4A9E8A; }
    .result-desc { color: #555; font-size: 0.95rem; margin-bottom: 8px; line-height: 1.6; }
    .hidden { display: none; }
  </style>
</head>
<body>

<!-- SCREEN 1: WELCOME -->
<div class="card" id="screen-welcome">
  <div class="welcome-icon">🌿</div>
  <h1>Know Your Dosha</h1>
  <p class="subtitle">Answer 8 quick questions to discover your Ayurvedic constitution and get a personalized daily routine.</p>
  <button class="btn btn-primary" onclick="startQuiz()" style="width:100%;margin-bottom:12px;">Take Dosha Quiz</button>
  <a class="skip-link" onclick="skipOnboarding()">Skip for now</a>
</div>

<!-- SCREEN 2: QUIZ -->
<div class="card hidden" id="screen-quiz">
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="question-label" id="questionLabel">Question 1 of 8</div>
  <div class="question-text" id="questionText"></div>
  <div id="optionsContainer"></div>
  <div class="nav-row">
    <button class="btn btn-secondary" id="btnBack" onclick="prevQuestion()">Back</button>
    <button class="btn btn-primary" id="btnNext" onclick="nextQuestion()" disabled>Next</button>
  </div>
</div>

<!-- SCREEN 3: RESULT -->
<div class="card hidden" id="screen-result">
  <div class="logo" id="resultEmoji"></div>
  <h1 id="resultTitle"></h1>
  <div class="dosha-badge" id="resultBadge"></div>
  <p class="result-desc" id="resultDesc"></p>
  <div class="score-row">
    <div class="score-item"><div class="score-label">Vata</div><div class="score-val" id="scoreV" style="color:#8B7BC8"></div></div>
    <div class="score-item"><div class="score-label">Pitta</div><div class="score-val" id="scoreP" style="color:#E07B54"></div></div>
    <div class="score-item"><div class="score-label">Kapha</div><div class="score-val" id="scoreK" style="color:#4A9E8A"></div></div>
  </div>
  <h3 style="font-size:0.95rem;color:#2d5a27;text-align:left;margin-bottom:8px;">Your Suggested Routine</h3>
  <ul class="routine-list" id="routineList"></ul>
  <button class="btn btn-primary" onclick="applyRoutine()" style="width:100%;margin-top:8px;">Apply Suggested Routine</button>
  <a class="skip-link" onclick="skipOnboarding()">Skip — I'll set reminders manually</a>
</div>

<script src="../js/dosha-scoring.js"></script>
<script>
  var quizData = null;
  var currentQ = 0;
  var answers = [];
  var calcResult = null;

  // Load questions JSON
  fetch('../data/dosha-questions.json')
    .then(function(r){ return r.json(); })
    .then(function(data){ quizData = data; })
    .catch(function(){ console.error('Could not load dosha-questions.json'); });

  function show(id) {
    ['screen-welcome','screen-quiz','screen-result'].forEach(function(s){
      document.getElementById(s).classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
  }

  function startQuiz() {
    if (!quizData) { alert('Loading questions, please try again.'); return; }
    currentQ = 0;
    answers = new Array(quizData.quiz.length).fill(null);
    renderQuestion();
    show('screen-quiz');
  }

  function renderQuestion() {
    var q = quizData.quiz[currentQ];
    var total = quizData.quiz.length;
    document.getElementById('progressBar').style.width = ((currentQ / total) * 100) + '%';
    document.getElementById('questionLabel').textContent = 'Question ' + (currentQ + 1) + ' of ' + total;
    document.getElementById('questionText').textContent = q.question;
    document.getElementById('btnBack').style.display = currentQ === 0 ? 'none' : 'block';
    var container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    q.options.forEach(function(opt, idx) {
      var btn = document.createElement('button');
      btn.className = 'option-btn' + (answers[currentQ] && answers[currentQ].text === opt.text ? ' selected' : '');
      btn.textContent = opt.text;
      btn.onclick = function() {
        answers[currentQ] = opt;
        document.querySelectorAll('.option-btn').forEach(function(b){ b.classList.remove('selected'); });
        btn.classList.add('selected');
        document.getElementById('btnNext').disabled = false;
      };
      container.appendChild(btn);
    });
    document.getElementById('btnNext').disabled = !answers[currentQ];
    document.getElementById('btnNext').textContent = currentQ === total - 1 ? 'See My Dosha' : 'Next';
  }

  function nextQuestion() {
    if (!answers[currentQ]) return;
    if (currentQ < quizData.quiz.length - 1) {
      currentQ++;
      renderQuestion();
    } else {
      showResult();
    }
  }

  function prevQuestion() {
    if (currentQ > 0) { currentQ--; renderQuestion(); }
  }

  function showResult() {
    var validAnswers = answers.filter(Boolean);
    calcResult = DoshaScoring.calculate(validAnswers);
    var dosha = calcResult.primary;
    var routine = quizData.routines[dosha];
    document.getElementById('resultEmoji').textContent = routine.emoji;
    document.getElementById('resultTitle').textContent = 'You are predominantly ' + dosha;
    var badge = document.getElementById('resultBadge');
    badge.textContent = dosha;
    badge.style.background = routine.color;
    document.getElementById('resultDesc').textContent = routine.description;
    document.getElementById('scoreV').textContent = calcResult.percentages.V + '%';
    document.getElementById('scoreP').textContent = calcResult.percentages.P + '%';
    document.getElementById('scoreK').textContent = calcResult.percentages.K + '%';
    var list = document.getElementById('routineList');
    list.innerHTML = '';
    routine.reminders.forEach(function(r) {
      var li = document.createElement('li');
      li.innerHTML = r.label + '<span>' + r.time + '</span>';
      list.appendChild(li);
    });
    document.getElementById('progressBar').style.width = '100%';
    show('screen-result');
  }

  function applyRoutine() {
    if (!calcResult) return;
    var dosha = calcResult.primary;
    var routine = quizData.routines[dosha];
    DoshaScoring.saveResult(dosha, routine);
    window.location.href = 'alerts.html';
  }

  function skipOnboarding() {
    localStorage.setItem('ayurtime_onboarding_done', 'skipped');
    window.location.href = '../index.html';
  }
</script>
</body>
</html>
