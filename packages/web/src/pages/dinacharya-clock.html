<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AyurTime - Dinacharya Clock</title>
<style>
:root{--vata:#a78bfa;--pitta:#f97316;--kapha:#34d399;--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
header{text-align:center;margin-bottom:2rem}
header h1{font-size:1.8rem}
header p{color:var(--muted);font-size:.9rem;margin-top:.3rem}
#clock-card{background:var(--card);border-radius:1.2rem;padding:2rem;max-width:520px;width:100%;box-shadow:0 4px 32px rgba(0,0,0,.4);margin-bottom:2rem;border-left:6px solid var(--vata);transition:border-color .6s}
.time-display{font-size:3rem;font-weight:700;letter-spacing:.05em;margin-bottom:.5rem}
.segment-name{font-size:1.3rem;font-weight:600;margin-bottom:.25rem}
.segment-sanskrit{color:var(--muted);font-style:italic;margin-bottom:.75rem}
.dosha-badge{display:inline-block;padding:.25rem .8rem;border-radius:999px;font-size:.85rem;font-weight:600;margin-bottom:1rem;color:#0f172a}
.activity{font-size:.95rem;line-height:1.5;color:#cbd5e1;margin-bottom:1rem}
.personal-note{background:rgba(255,255,255,.06);border-radius:.6rem;padding:.75rem 1rem;font-size:.88rem;color:#e2e8f0;display:none}
#ritu-card{background:var(--card);border-radius:1rem;padding:1.25rem 1.5rem;max-width:520px;width:100%;margin-bottom:2rem;display:flex;align-items:flex-start;gap:1rem}
.ritu-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ritu-title{font-weight:600;margin-bottom:.2rem}
.ritu-desc{font-size:.88rem;color:var(--muted)}
#prakriti-selector{max-width:520px;width:100%;margin-bottom:2rem}
#prakriti-selector label{display:block;margin-bottom:.5rem;color:var(--muted);font-size:.9rem}
#prakriti-selector select{width:100%;padding:.6rem 1rem;border-radius:.6rem;border:1px solid #334155;background:var(--card);color:var(--text);font-size:1rem}
#segments-section{max-width:520px;width:100%}
#segments-section h2{font-size:1.1rem;margin-bottom:1rem;color:var(--muted)}
.segment-row{display:flex;align-items:center;gap:.75rem;padding:.65rem .75rem;border-radius:.6rem;margin-bottom:.4rem;font-size:.88rem;opacity:.65;transition:opacity .3s,background .3s}
.segment-row.active{opacity:1;background:rgba(255,255,255,.07)}
.seg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.seg-time{color:var(--muted);min-width:90px;font-size:.8rem}
.seg-name{font-weight:500;flex:1}
.seg-dosha{font-size:.75rem;padding:.1rem .5rem;border-radius:999px;color:#0f172a;font-weight:600}
footer{margin-top:3rem;color:var(--muted);font-size:.8rem}
</style>
</head>
<body>
<header>
<h1>AyurTime Dinacharya Clock</h1>
<p>Live Ayurvedic time state - Pune, Maharashtra</p>
</header>
<div id="prakriti-selector">
<label for="prakriti-select">Your Prakriti (optional - for personalised notes):</label>
<select id="prakriti-select">
<option value="">-- Select your primary dosha --</option>
<option value="Vata">Vata (Air + Ether)</option>
<option value="Pitta">Pitta (Fire + Water)</option>
<option value="Kapha">Kapha (Earth + Water)</option>
</select>
</div>
<div id="clock-card">
<div class="time-display" id="time-display">--:--</div>
<div class="segment-name" id="segment-name">Loading...</div>
<div class="segment-sanskrit" id="segment-sanskrit"></div>
<span class="dosha-badge" id="dosha-badge">Vata</span>
<div class="activity" id="activity"></div>
<div class="personal-note" id="personal-note"></div>
</div>
<div id="ritu-card">
<div class="ritu-dot" id="ritu-dot" style="background:#34d399"></div>
<div>
<div class="ritu-title" id="ritu-title">Current Season</div>
<div class="ritu-desc" id="ritu-desc"></div>
</div>
</div>
<div id="segments-section">
<h2>Day Timeline - All 9 Segments</h2>
<div id="segments-list"></div>
</div>
<footer>AyurTime 2026 - Powered by Classical Ayurveda and ayur-calendar.js</footer>
<script src="../js/ayur-calendar.js"></script>
<script>
var DC=window.AyurCalendar;
var COLORS={Vata:'#a78bfa',Pitta:'#f97316',Kapha:'#34d399'};
function pad(n){return String(Math.floor(Math.abs(n))).padStart(2,'0');}
function render(){
var p=document.getElementById('prakriti-select').value||null;
var s=DC.getAyurTimeState({prakriti:p});
var seg=s.dinacharyaSegment,ritu=s.ritu,c=seg.doshaColor||COLORS[seg.dominantDosha]||'#888';
document.getElementById('time-display').textContent=s.currentTime.formatted;
document.getElementById('segment-name').textContent=seg.name;
document.getElementById('segment-sanskrit').textContent=seg.sanskrit;
var b=document.getElementById('dosha-badge');b.textContent=seg.dominantDosha;b.style.background=c;
document.getElementById('activity').textContent=seg.activity;
document.getElementById('clock-card').style.borderLeftColor=c;
var ne=document.getElementById('personal-note');
if(s.personalNote){ne.textContent=s.personalNote;ne.style.display='block';}else{ne.style.display='none';}
var rc=COLORS[ritu.dominantDosha]||'#888';
document.getElementById('ritu-dot').style.background=rc;
document.getElementById('ritu-title').textContent=ritu.name+' Ritu ('+ritu.dominantDosha+'-dominant)';
document.getElementById('ritu-desc').textContent=ritu.description;
var list=document.getElementById('segments-list');
var segs=DC.getSegmentsForDay();
var h=s.currentTime.decimal;
list.innerHTML='';
segs.forEach(function(sg){
var active=sg.startHour<sg.endHour?(h>=sg.startHour&&h<sg.endHour):(h>=sg.startHour||h<sg.endHour);
var row=document.createElement('div');
row.className='segment-row'+(active?' active':'');
var sc=COLORS[sg.dosha]||'#888';
row.innerHTML='<div class="seg-dot" style="background:'+sc+'"></div>'+
'<span class="seg-time">'+pad(sg.startHour)+':'+pad((sg.startHour%1)*60)+' - '+pad(sg.endHour%24)+':'+pad((sg.endHour%1)*60)+'</span>'+
'<span class="seg-name">'+sg.name+'</span>'+
'<span class="seg-dosha" style="background:'+sc+'">'+sg.dosha+'</span>';
list.appendChild(row);
});
}
render();
setInterval(render,60000);
document.getElementById('prakriti-select').addEventListener('change',render);
</script>
</body>
</html>
