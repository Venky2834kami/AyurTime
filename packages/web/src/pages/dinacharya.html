<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dinacharya Tracker - AyurTime</title>
  <style>
    :root { --primary: #4caf50; --secondary: #2e7d32; --accent: #ff9800; --bg: #f5f5f5; --card: #ffffff; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
    .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
    .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
    .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .dosha-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; background: #e8f5e9; color: var(--secondary); font-weight: bold; margin-bottom: 10px; }
    .streak-box { text-align: center; font-size: 1.2rem; color: var(--accent); font-weight: bold; }
    .section-title { font-size: 1.1rem; color: var(--secondary); margin: 15px 0 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
    .activity-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
    .activity-item:last-child { border-bottom: none; }
    .checkbox { width: 24px; height: 24px; border: 2px solid var(--primary); border-radius: 6px; margin-right: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .checkbox.checked { background: var(--primary); color: white; }
    .checkbox.checked::after { content: '✓'; font-weight: bold; }
    .activity-info { flex-grow: 1; }
    .activity-name { font-weight: 500; }
    .activity-time { font-size: 0.85rem; color: #666; }
    .progress-bar { height: 10px; background: #eee; border-radius: 5px; margin: 10px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
    .footer { text-align: center; padding: 20px; font-size: 0.9rem; color: #888; }
    .btn-reset { background: none; border: 1px solid #ccc; color: #888; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 20px; border-radius: 12px; max-width: 400px; width: 90%; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌅 Dinacharya Tracker</h1>
  </div>

  <div class="container">
    <div class="card streak-box">
      🔥 Current Streak: <span id="streakCount">0</span> Days
    </div>

    <div class="card">
      <div id="doshaInfo">
        <span class="dosha-badge" id="userDosha">Loading...</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div style="text-align: right; font-size: 0.9rem; color: #666;">
        <span id="completedCount">0</span>/<span id="totalCount">0</span> Complete
      </div>
    </div>

    <div class="card">
      <div class="section-title">Morning Routine</div>
      <div id="morningList"></div>
      
      <div class="section-title">Evening Routine</div>
      <div id="eveningList"></div>
      
      <button class="btn-reset" onclick="resetToday()">Reset Today's Progress</button>
    </div>

    <div class="footer">
      Powered by AyurTime Knowledge Engine
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'ayurtime_dinacharya_log';
    const DOSHA_KEY = 'ayurtime_routine';
    const DATA_URL = '../data/dinacharya-routines.json';

    let userDosha = 'Vata'; // Default
    let allRoutines = [];
    let currentRoutine = null;
    let completionData = {};

    async function init() {
      // 1. Get Dosha
      const savedDoshaData = localStorage.getItem(DOSHA_KEY);
      if (savedDoshaData) {
        try {
          const parsed = JSON.parse(savedDoshaData);
          userDosha = parsed.dosha || 'Vata';
        } catch(e) {}
      }
      document.getElementById('userDosha').textContent = userDosha + ' Type';

      // 2. Load Routines
      try {
        const resp = await fetch(DATA_URL);
        const data = await resp.json();
        allRoutines = data.routines;
        currentRoutine = allRoutines.find(r => r.dosha === userDosha) || allRoutines[0];
      } catch(e) {
        console.error("Failed to load routines", e);
      }

      // 3. Load Completion Data
      const savedLog = localStorage.getItem(STORAGE_KEY);
      if (savedLog) completionData = JSON.parse(savedLog);

      render();
      updateStreak();
    }

    function getTodayKey() {
      return new Date().toISOString().split('T')[0];
    }

    function render() {
      if (!currentRoutine) return;
      const today = getTodayKey();
      const todayLog = completionData[today] || [];

      const renderList = (activities, containerId) => {
        const container = document.getElementById(containerId);
        container.innerHTML = activities.map(act => `
          <div class="activity-item" onclick="toggleActivity('${act.id}')">
            <div class="checkbox ${todayLog.includes(act.id) ? 'checked' : ''}"></div>
            <div class="activity-info">
              <div class="activity-name">${act.name}</div>
              <div class="activity-time">⏰ ${act.time} (${act.duration} min)</div>
            </div>
          </div>
        `).join('');
      };

      renderList(currentRoutine.morning, 'morningList');
      renderList(currentRoutine.evening, 'eveningList');

      // Update Progress
      const total = currentRoutine.morning.length + currentRoutine.evening.length;
      const done = todayLog.length;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('completedCount').textContent = done;
      document.getElementById('progressFill').style.width = (done / total * 100) + '%';
    }

    function toggleActivity(id) {
      const today = getTodayKey();
      if (!completionData[today]) completionData[today] = [];
      
      const idx = completionData[today].indexOf(id);
      if (idx > -1) {
        completionData[today].splice(idx, 1);
      } else {
        completionData[today].push(id);
      }

      localStorage.setItem(STORAGE_KEY, JSON.stringify(completionData));
      render();
      updateStreak();
    }

    function updateStreak() {
      let streak = 0;
      let date = new Date();
feat(issue#9): implement dinacharya tracker UI with daily habits and streak system      while (true) {
        const key = date.toISOString().split('T')[0];
        if (completionData[key] && completionData[key].length > 0) {
          streak++;
          date.setDate(date.getDate() - 1);
        } else {
          // If it's today and empty, check yesterday
          if (key === getTodayKey()) {
             date.setDate(date.getDate() - 1);
             continue;
          }
          break;
        }
      }
      document.getElementById('streakCount').textContent = streak;
    }

    function resetToday() {
      if(confirm("Clear today's progress?")) {
        delete completionData[getTodayKey()];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(completionData));
        render();
        updateStreak();
      }
    }

    init();
  </script>
</body>
</html>
