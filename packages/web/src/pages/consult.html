<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Consult - AyurTime</title>
    <link rel="stylesheet" href="../../src/styles/main.css">
    <style>
.chat-container {
  max-width: 800px;
  margin: 20px auto;
  height: 70vh;
  display: flex;
  flex-direction: column;
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  overflow: hidden;
}
#chatHistory {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 15px;
}
.message {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 0.95rem;
  line-height: 1.4;
}
.bot-message {
  align-self: flex-start;
  background: #e8f5e9;
  color: #2e7d32;
  border-bottom-left-radius: 4px;
}
.user-message {
  align-self: flex-end;
  background: #2e7d32;
  color: white;
  border-bottom-right-radius: 4px;
}
.chat-input-area {
  padding: 15px;
  border-top: 1px solid #eee;
  display: flex;
  gap: 10px;
}
#userInput {
  flex: 1;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  outline: none;
}
#sendBtn {
  padding: 12px 24px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
}
#sendBtn:hover {
  background: #1b5e20;
}
.typing-indicator {
  display: none;
  padding: 10px;
  font-style: italic;
  color: #666;
  text-align: center;
}

/* NEW: Auto-mode reasoning card */
.reasoning-card {
  background: #fff8e1;
  border-left: 4px solid #f57c00;
  padding: 12px;
  margin-top: 10px;
  border-radius: 4px;
  font-size: 0.85rem;
}
.reasoning-card strong {
  color: #e65100;
}
.recommendations-list {
  margin: 8px 0;
  padding-left: 20px;
}
.recommendations-list li {
  margin: 4px 0;
  color: #555;
}
.dosha-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  margin-left: 6px;
}
.dosha-vata { background: #e3f2fd; color: #1976d2; }
.dosha-pitta { background: #fff3e0; color: #e65100; }
.dosha-kapha { background: #f1f8e9; color: #558b2f; }
    </style>
</head>
<body>
<div class="chat-container">
  <div id="chatHistory">
    <div class="message bot-message">
      <strong>🔥 Ayurvedic AI Consultation</strong><br>
      Namaste! I am your AyurTime AI Coach powered by Charaka Samhita and Pāṇini's sūtra logic. Describe your symptoms or how you feel, and I will provide personalized Ayurvedic guidance.
    </div>
  </div>
  <form id="chatForm" class="chat-input-area">
    <input type="text" id="userInput" placeholder="Type your symptoms (e.g., feeling heavy, gas and bloating, burning sensation)..." autocomplete="off">
    <button type="submit" id="sendBtn">Send</button>
  </form>
  <div id="typingIndicator" class="typing-indicator">AI Coach is thinking...</div>
</div>

<script src="../scripts/consult-engine.js"></script>
<script>
const chatForm = document.getElementById('chatForm');
const userInput = document.getElementById('userInput');
const chatHistory = document.getElementById('chatHistory');
const typingIndicator = document.getElementById('typingIndicator');

chatForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = userInput.value.trim();
  if (!text) return;
  
  appendMessage(text, 'user');
  userInput.value = '';
  typingIndicator.style.display = 'block';
  
  setTimeout(() => {
    const result = AyurConsultEngine.process(text);
    typingIndicator.style.display = 'none';
    appendBotResponse(result);
  }, 1000);
});

function appendMessage(text, sender) {
  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${sender}-message`;
  msgDiv.textContent = text;
  chatHistory.appendChild(msgDiv);
  chatHistory.scrollTop = chatHistory.scrollHeight;
}

function appendBotResponse(result) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message bot-message';
  
  // Main summary
  const summary = document.createElement('div');
  summary.textContent = result.summary;
  msgDiv.appendChild(summary);
  
  // Auto-mode reasoning card (if rules fired)
  if (result.firedRules && result.firedRules.length > 0) {
    const card = document.createElement('div');
    card.className = 'reasoning-card';
    
    let cardHTML = '<strong>🧠 Classical Reasoning:</strong><br>';
    
    // Detected dosha
    if (result.detectedDosha) {
      cardHTML += `Detected imbalance: <span class="dosha-badge dosha-${result.detectedDosha}">${result.detectedDosha}</span><br>`;
    }
    
    // Fired rule
    const topRule = result.firedRules[0];
    cardHTML += `Rule applied: <em>${topRule.source}</em> (Priority: ${topRule.priority})<br>`;
    
    // Recommendations
    if (result.recommendations && result.recommendations.length > 0) {
      cardHTML += '<strong>Lifestyle steps:</strong><ul class="recommendations-list">';
      result.recommendations.slice(0, 3).forEach(rec => {
        cardHTML += `<li>${rec}</li>`;
      });
      cardHTML += '</ul>';
    }
    
    card.innerHTML = cardHTML;
    msgDiv.appendChild(card);
  }
  
  chatHistory.appendChild(msgDiv);
  chatHistory.scrollTop = chatHistory.scrollHeight;
}
</script>
</body>
</html>
