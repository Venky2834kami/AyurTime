<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intelligent Alerts - AyurTime</title>
  <style>
    :root { --primary: #2e7d32; --accent: #ff8f00; --bg: #f5f5f5; --card: #ffffff; --vata: #8B7BC8; --pitta: #E07B54; --kapha: #4A9E8A; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 0; }
    .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
    .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
    .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
    .status-active { background: #e8f5e9; color: var(--primary); }
    .reminder-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
    .reminder-item:last-child { border-bottom: none; }
    .reminder-icon { font-size: 1.5rem; }
    .reminder-content { flex-grow: 1; }
    .reminder-title { font-weight: bold; margin-bottom: 3px; }
    .reminder-time { font-size: 0.8rem; color: #888; }
    .btn-notify { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    .history-title { font-size: 0.9rem; color: #666; text-transform: uppercase; margin-bottom: 10px; }
    .dosha-indicator { height: 4px; width: 100%; border-radius: 2px; margin-top: 5px; }
    .bg-vata { background: var(--vata); }
    .bg-pitta { background: var(--pitta); }
    .bg-kapha { background: var(--kapha); }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔔 Smart Reminders</h1>
  </div>

  <div class="container">
    <div class="card">
      <div id="doshaBadge" class="status-badge status-active">...</div>
      <div id="engineStatus">The Intelligent Reminder Engine is monitoring your daily cycle.</div>
      <div id="doshaLine" class="dosha-indicator"></div>
    </div>

    <button class="btn-notify" id="notifyBtn" onclick="requestPermission()">Enable Push Notifications</button>

    <div class="card">
      <div class="history-title">Upcoming / Contextual Suggestion</div>
      <div id="currentContext">
        <div class="reminder-item">
          <div class="reminder-icon">🌿</div>
          <div class="reminder-content">
            <div class="reminder-title" id="suggestionTitle">Analyzing context...</div>
            <div class="reminder-time" id="suggestionSub">Based on your dosha and current time</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="history-title">Recent History</div>
      <div id="historyList">
        <div style="color: #ccc; text-align: center; padding: 20px;">No recent alerts</div>
      </div>
    </div>
  </div>

  <script>
    const DOSHA_KEY = 'ayurtime_routine';
    const AGNI_KEY = 'ayurtime_agni_log';
    
    const DATABASE = {
      Vata: {
        morning: { title: "Grounding Morning", text: "Morning is Vata time. Favor a warm, oily breakfast and gentle stretching." },
        afternoon: { title: "Stay Hydrated", text: "Keep a thermos of warm water. Avoid iced drinks to protect Agni." },
        evening: { title: "Calm & Warm", text: "Slow down. A warm milk with nutmeg will help ground your restless energy." }
      },
      Pitta: {
        morning: { title: "Cooling Start", text: "Start your day with cooling breathwork. Avoid over-exertion in the sun." },
        afternoon: { title: "Lunch is Key", text: "Enjoy your largest meal now when your Agni is highest. Favor bitter greens." },
        evening: { title: "Wind Down", text: "Moonlight walks are perfect for you. Avoid spicy foods tonight." }
      },
      Kapha: {
        morning: { title: "Energize Now", text: "Wake up early and move! Intense activity clears the morning Kapha fog." },
        afternoon: { title: "Keep it Light", text: "A light, warm, and spicy lunch will keep your energy moving." },
        evening: { title: "Stay Active", text: "Socialize or engage in creative work. Avoid heavy dairy before bed." }
      }
    };

    function init() {
      const saved = localStorage.getItem(DOSHA_KEY);
      const dosha = saved ? JSON.parse(saved).dosha : 'Vata';
      
      document.getElementById('doshaBadge').textContent = dosha + ' Mode Active';
      document.getElementById('doshaBadge').style.color = 'white';
      document.getElementById('doshaBadge').style.background = 'var(--' + dosha.toLowerCase() + ')';
      document.getElementById('doshaLine').className = 'dosha-indicator bg-' + dosha.toLowerCase();

      updateContext(dosha);
      checkNotificationStatus();
    }

    function updateContext(dosha) {
      const hour = new Date().getHours();
      let period = 'afternoon';
      if (hour < 11) period = 'morning';
      else if (hour > 17) period = 'evening';

      const data = DATABASE[dosha][period];
      
      // Agni Checkfeat(issue#12): implement intelligent reminder engine with dosha and agni context awareness
      const agniLog = JSON.parse(localStorage.getItem(AGNI_KEY) || '{}');
      const today = new Date().toISOString().split('T')[0];feat(issue#12): implement intelligent reminder engine with dosha and agni context awareness
      if (agniLog[today] && agniLog[today].agni === 'manda') {
         document.getElementById('suggestionTitle').textContent = "⚠️ Agni is Weak";
         document.getElementById('suggestionSub').textContent = "Focus on sipping ginger water and eating very light.";
      } else {
         document.getElementById('suggestionTitle').textContent = data.title;
         document.getElementById('suggestionSub').textContent = data.text;
      }
    }

    function requestPermission() {
      Notification.requestPermission().then(permission => {
        if (permission === "granted") {
          alert("Notifications enabled!");
          checkNotificationStatus();
        }
      });
    }

    function checkNotificationStatus() {
      if (Notification.permission === "granted") {
        document.getElementById('notifyBtn').textContent = "✅ Notifications Active";
        document.getElementById('notifyBtn').style.background = "#4caf50";
        document.getElementById('notifyBtn').disabled = true;
      }
    }

    init();
  </script>
</body>
</html>
